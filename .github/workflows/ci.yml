name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - name: install deps
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libglib2.0-dev libwebkit2gtk-4.1-dev 
      - name: install wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: build wails
        run: wails build -tags webkit2_41
      - name: build
        run: go build ./...
      - name: test
        run: go test -race ./...
